name: "turbo_cache_server_otel"

services:
  s3_bucket:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - s3_data:/data
      - s3_logs:/logs
    command:
      - --address
      - :9000
      - --console-enable
      - --access-key
      - rustfsadmin
      - --secret-key
      - rustfsadmin
      - /data

  # Observability
  collector:
    image: otel/opentelemetry-collector:0.149.0@sha256:dd56aed607fd02f8ac01dddb27a859c0c2cc750539abce927803778fafc736ae
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317" # OTELP GRPC
      - "4318:4318" # OTELP HTTP

  prometheus:
    image: prom/prometheus:v3.11.1@sha256:759ea6db49103737f2a6f420b0d1632062d8ad99dec086c76db605fd0bf23e15
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-otlp-receiver
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/jaeger:2.17.0@sha256:6266573208d665ce5c17483bce0a75d0806480d92c84766d288d0aee885ce708
    ports:
      - "4317" # OTELP GRPC
      - "4318" # OTELP HTTP
      - "16686:16686" # Jaeger UI

volumes:
  s3_data:
  s3_logs:
  
